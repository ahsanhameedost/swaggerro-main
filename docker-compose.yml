# NOTE: Postgres is no longer run locally — the app uses the shared Azure
# Postgres live DB (see DATABASE_URL in apps/api/.env, schema "soaswag").
# Redis + MailHog are still required for local dev.
services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - soaswag_redis:/data

  mailhog:
     image: mailhog/mailhog
     ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  soaswag_redis:
